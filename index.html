<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://kit.fontawesome.com/546bb97bde.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/main.js" defer></script>
    <title>Lion School</title>
</head>

<body>
    <header>
        <img src="./img/logo.svg" alt="">

        <div class="botaoHeader">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <p>Sair</p>
        </div>
    </header>
    <header class="headerAuxiliar">
        <div class="statusContainer">
            <h3>Status:</h3>

            <div class="menuStatus">
                <div class="menuStatusItem">
                    <p>Finalizado</p>
                    <i class="fa-solid fa-check"></i>
                </div>
                <div class="menuStatusItem">
                    <p>Cursando</p>
                    <i class="fa-solid fa-check"></i>
                </div>
            </div>
        </div>

        <div class="legendaContainer">
            <h3>LEGENDA</h3>

            <div class="itemLegenda">
                <div class="amostraCor roxo"></div>
                <p>Cursando</p>
            </div>

            <div class="itemLegenda"></div>
                <div class="amostraCor amarelo"></div>
                <p>Finalizado</p>
            </div>
        </div>
    </header>

    <main class="telaInicial">
        <div class="conteudoInicial">
            <div class="colunaInicial textoComeco">
                <div>
                    <h1>Escolha um <span>curso</span></h1>
                    <h1>para gerenciar</h1>
                </div>
                <img src="./img/devices.svg" alt="">
            </div>
            <div class="colunaInicial">
                <img class="studentImg" src="./img/studant.svg" alt="">
            </div>

            <div class="colunaInicial containerItensCurso">
                <div class="itemCurso">
                    <i class="fa-solid fa-code"></i>
                    <p>DS</p>
                </div>
                <div class="itemCurso">
                    <i class="fa-solid fa-network-wired"></i>
                    <p>REDE</p>
                </div>
            </div>
        </div>
        </div>

    </main>

    <main class="telaPrincipal">

    </main>

    <footer>
        <div class="contatosContainer">
            <a href="" class="linkFooter">
                <div class="contato">
                    <i class="fa-solid fa-phone"></i>
                    <p>(11) 4774-4700</p>
                </div>
            </a>
            <a href="" class="linkFooter">
                <div class="contato">
                    <i class="fa-solid fa-envelope"></i>
                    <p>lionschool@gmail.com</p>
                </div>
            </a>
            <a href="" class="linkFooter">
                <div class="contato">
                    <i class="fa-solid fa-location-dot"></i>
                    <p>Rua tcc, 211,  Centro, Jandira</p>
                </div>
            </a>
        </div>
        <p class="creditos">Copyright © 2026 | Gabriel José</p>
        <div class="redesContainer">
            <a href="" class="linkFooter">
                <div class="rede">
                    <i class="fa-brands fa-youtube"></i>
                </div>
            </a>
            <a href="" class="linkFooter">
                <div class="rede">
                    <i class="fa-brands fa-twitter"></i>
                </div>
            </a>
            <a href="" class="linkFooter">
                <div class="rede">
                    <i class="fa-brands fa-instagram"></i>
                </div>
            </a>
            <a href="" class="linkFooter">
                <div class="rede">
                    <i class="fa-brands fa-facebook"></i>
                </div>
            </a>
        </div>
    </footer>
</body>

</html>
